name: Build & Sign APK (Docker)

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: 'Version code for APK (optional)'
        required: false
        default: '1'
      releaseType:
        description: 'Release type: debug or release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bubblewrap/bubblewrap:latest
      # This container comes with Node.js, Java JDK, Bubblewrap installed

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Decode keystore
      - name: Prepare Keystore
        run: |
          mkdir -p ./twa
          echo "$KEYSTORE_BASE64" | base64 --decode > ./twa/keystore.jks

      # 3️⃣ Update versionCode in TWA manifest (optional)
      - name: Update versionCode
        run: |
          if [ "${{ github.event.inputs.versionCode }}" != "" ]; then
            sed -i "s/\"versionCode\": [0-9]\+/\"versionCode\": ${{ github.event.inputs.versionCode }}/" ./twa/twa-manifest.json
          fi

      # 4️⃣ Build APK (fully non-interactive)
      - name: Build APK
        working-directory: ./twa
        run: |
          bubblewrap build --${{ github.event.inputs.releaseType }} --skip-checks

      # 5️⃣ Sign APK
      - name: Sign APK
        working-directory: ./twa
        run: |
          jarsigner -verbose -keystore ./keystore.jks \
          -storepass "$KEYSTORE_PASSWORD" \
          -keypass "$KEY_PASSWORD" \
          ./app-release-unsigned.apk "$KEY_ALIAS"

          # Align APK
          zipalign -v 4 ./app-release-unsigned.apk ./app-release.apk

      # 6️⃣ Upload signed APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chore-quest-apk
          path: ./twa/app-release.apk
