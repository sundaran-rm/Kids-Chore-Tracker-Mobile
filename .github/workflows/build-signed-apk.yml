name: Build & Sign APK

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: 'Version code for APK (optional)'
        required: false
        default: '1'
      releaseType:
        description: 'Release type: debug or release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Prepare Keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ./twa/keystore.jks

      - name: Update versionCode
        run: |
          if [ "${{ github.event.inputs.versionCode }}" != "" ]; then
            sed -i "s/\"versionCode\": [0-9]\+/\"versionCode\": ${{ github.event.inputs.versionCode }}/" ./twa/twa-manifest.json
          fi

      - name: Build APK (non-interactive)
        working-directory: ./twa
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          BUBBLEWRAP_SKIP_CHECKS: true
          BUBBLEWRAP_NON_INTERACTIVE: true
        run: bubblewrap build --${{ github.event.inputs.releaseType }} --skip-checks

      - name: Sign APK
        working-directory: ./twa
        run: |
          jarsigner -verbose -keystore ./keystore.jks \
          -storepass "$KEYSTORE_PASSWORD" \
          -keypass "$KEY_PASSWORD" \
          ./app-release-unsigned.apk "$KEY_ALIAS"

          zipalign -v 4 ./app-release-unsigned.apk ./app-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chore-quest-apk
          path: ./twa/app-release.apk
