name: Build & Sign APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (integer, e.g. 1)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    # ── Use official Bubblewrap Docker image ─────────────────────
    # Pre-installed: Node.js, JDK 17, Android SDK, Bubblewrap CLI
    # This eliminates ALL interactive JDK/SDK installation prompts.
    container:
      image: ghcr.io/googlechromelabs/bubblewrap:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Decode signing keystore ──────────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release-keystore.jks

      # ── Optionally bump version ──────────────────────────────────
      - name: Update version in twa-manifest
        working-directory: twa
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          if [ -n "$VERSION_NAME" ]; then
            apt-get update && apt-get install -y jq 2>/dev/null || true
            if command -v jq &>/dev/null; then
              jq --arg v "$VERSION_NAME" '.appVersionName = $v' twa-manifest.json > tmp.json && mv tmp.json twa-manifest.json
              jq --argjson v "$VERSION_CODE" '.appVersionCode = $v' twa-manifest.json > tmp.json && mv tmp.json twa-manifest.json
            else
              sed -i "s/\"appVersionName\": \"[^\"]*\"/\"appVersionName\": \"$VERSION_NAME\"/" twa-manifest.json
              sed -i "s/\"appVersionCode\": [0-9]*/\"appVersionCode\": $VERSION_CODE/" twa-manifest.json
            fi
          fi
          echo "📋 twa-manifest.json:"
          cat twa-manifest.json

      # ── Generate & Build TWA ─────────────────────────────────────
      # Inside the Docker container, JDK and Android SDK are already
      # configured so bubblewrap won't ask to install them.
      # bubblewrap init still asks project config questions — we use
      # the existing twa-manifest.json values via 'expect' to handle
      # the few remaining interactive prompts.
      - name: Install expect
        run: apt-get update && apt-get install -y expect 2>/dev/null || true

      - name: Generate TWA project
        working-directory: twa
        run: |
          # Use expect to handle interactive prompts from bubblewrap init
          # The twa-manifest.json already has all config — we just need
          # to press Enter to accept defaults and provide a name for the
          # signing key identity (the actual signing uses our keystore).
          expect << 'EXPECT_EOF'
          set timeout 600
          spawn bubblewrap init --manifest https://sundaran-rm.github.io/Kids-Chore-Tracker-Mobile/pwa/manifest.json --skipPwaValidation

          while {1} {
            expect {
              -re "install.*JDK" { send "n\r" }
              -re "install.*Android" { send "n\r" }
              -re "install.*SDK" { send "n\r" }
              "First and Last" { send "CI Build\r" }
              "Organizational Unit" { send "Dev\r" }
              "Organization:" { send "Dev\r" }
              "City or Locality" { send "City\r" }
              "State or Province" { send "State\r" }
              "Country Code" { send "US\r" }
              -re "password" { send "temppass123\r" }
              -re "\\(Y/n\\)" { send "y\r" }
              -re "\\(y/N\\)" { send "n\r" }
              -re "\\? .*:" { send "\r" }
              -re "\\? .*\\)" { send "\r" }
              eof { break }
              timeout { puts "⏰ Timeout"; break }
            }
          }

          catch wait result
          set exit_code [lindex $result 3]
          puts "bubblewrap init exited with code: $exit_code"
          exit $exit_code
          EXPECT_EOF

          echo ""
          echo "📁 Generated project structure:"
          ls -la

      - name: Build TWA
        working-directory: twa
        run: |
          expect << 'EXPECT_EOF'
          set timeout 600
          spawn bubblewrap build --skipPwaValidation --signingKeyPath /tmp/release-keystore.jks --signingKeyAlias $env(KEY_ALIAS)

          while {1} {
            expect {
              -re "regenerate.*\\(Y/n\\)" { send "n\r" }
              -re "\\(Y/n\\)" { send "y\r" }
              -re "\\(y/N\\)" { send "n\r" }
              eof { break }
              timeout { puts "⏰ Timeout"; break }
            }
          }

          catch wait result
          set exit_code [lindex $result 3]
          puts "bubblewrap build exited with code: $exit_code"
          exit $exit_code
          EXPECT_EOF
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          BUBBLEWRAP_KEYPASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUBBLEWRAP_STOREPASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      # ── Locate and re-sign APK ───────────────────────────────────
      - name: Sign APK
        run: |
          APK_FILE=$(find /github/workspace/twa -name "*-signed.apk" -o -name "*-release.apk" -o -name "*.apk" 2>/dev/null | head -1)

          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK found! Listing build output:"
            find /github/workspace/twa -type f \( -name "*.apk" -o -name "*.aab" \)
            ls -laR /github/workspace/twa/app/build/outputs/ 2>/dev/null || true
            exit 1
          fi

          echo "📦 Found: $APK_FILE"

          # Find apksigner
          APKSIGNER=$(find / -name "apksigner" -type f 2>/dev/null | sort -r | head -1)

          if [ -n "$APKSIGNER" ]; then
            echo "🔏 Signing with apksigner..."
            "$APKSIGNER" sign \
              --ks /tmp/release-keystore.jks \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out /tmp/chore-quest-signed.apk \
              "$APK_FILE"
          else
            echo "⚠️ apksigner not found — using jarsigner"
            cp "$APK_FILE" /tmp/chore-quest-signed.apk
            jarsigner -verbose \
              -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore /tmp/release-keystore.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              /tmp/chore-quest-signed.apk \
              "${{ secrets.KEY_ALIAS }}"
          fi

      # ── Verify ───────────────────────────────────────────────────
      - name: Verify APK signature
        run: |
          APKSIGNER=$(find / -name "apksigner" -type f 2>/dev/null | sort -r | head -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose /tmp/chore-quest-signed.apk
          else
            jarsigner -verify /tmp/chore-quest-signed.apk
          fi

      # ── Upload artifact ──────────────────────────────────────────
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: chore-quest-v${{ github.event.inputs.version_name || '1.0.0' }}
          path: /tmp/chore-quest-signed.apk
          retention-days: 30

      # ── Cleanup ──────────────────────────────────────────────────
      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/release-keystore.jks
