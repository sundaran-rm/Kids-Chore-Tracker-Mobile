name: Build & Sign APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (integer, e.g. 1)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y expect
          cd twa && npm install

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/release-keystore.jks"

      - name: Update version in twa-manifest
        working-directory: twa
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          if [ -n "$VERSION_NAME" ]; then
            jq --arg v "$VERSION_NAME" '.appVersionName = $v' twa-manifest.json > tmp.json && mv tmp.json twa-manifest.json
          fi
          if [ -n "$VERSION_CODE" ]; then
            jq --argjson v "$VERSION_CODE" '.appVersionCode = $v' twa-manifest.json > tmp.json && mv tmp.json twa-manifest.json
          fi
          echo "📋 twa-manifest.json:"
          cat twa-manifest.json

      # ── Generate TWA Android project ─────────────────────────────
      # Answer Y to JDK/SDK install (avoids the JDK-path prompt that
      # caused character-echo issues). bubblewrap downloads its own
      # JDK/SDK — the PTY from expect makes this work in CI.
      - name: Generate TWA project
        working-directory: twa
        run: |
          cat > /tmp/init_twa.exp << 'EXPECT_SCRIPT'
          #!/usr/bin/expect -f
          set timeout 900

          spawn npx bubblewrap init --manifest https://sundaran-rm.github.io/Kids-Chore-Tracker-Mobile/pwa/manifest.json --skipPwaValidation

          while {1} {
            expect {
              "Do you want Bubblewrap to install the JDK" {
                send "\r"
              }
              "Do you want Bubblewrap to install" {
                send "\r"
              }
              "terms and conditions" {
                send "y\r"
              }
              "Do you agree" {
                send "y\r"
              }
              "First and Last names" {
                send "John Doe\r"
              }
              "Organizational Unit" {
                send "Development\r"
              }
              "Organization:" {
                send "ChoreQuest\r"
              }
              "City or Locality" {
                send "Internet\r"
              }
              "State or Province" {
                send "Web\r"
              }
              "Country Code" {
                send "US\r"
              }
              "Key store location" {
                send "\r"
              }
              "Key name" {
                send "\r"
              }
              -re "assword" {
                send "ASDasd123!!\r"
              }
              "\\? " {
                send "\r"
              }
              eof {
                break
              }
            }
          }

          catch wait result
          set exit_code [lindex $result 3]
          puts "\n📦 bubblewrap init exit code: $exit_code"
          exit $exit_code
          EXPECT_SCRIPT

          expect /tmp/init_twa.exp

          echo ""
          echo "📁 Generated project files:"
          ls -la

      # ── Build TWA APK ────────────────────────────────────────────
      - name: Build TWA
        working-directory: twa
        run: |
          cat > /tmp/build_twa.exp << 'EXPECT_SCRIPT'
          #!/usr/bin/expect -f
          set timeout 600

          set keystore_path $env(KEYSTORE_PATH)
          set key_alias $env(KEY_ALIAS)

          spawn npx bubblewrap build --skipPwaValidation --signingKeyPath $keystore_path --signingKeyAlias $key_alias

          while {1} {
            expect {
              "regenerate" {
                send "n\r"
              }
              "Do you want Bubblewrap to install" {
                send "\r"
              }
              "\\? " {
                send "\r"
              }
              eof {
                break
              }
            }
          }

          catch wait result
          set exit_code [lindex $result 3]
          puts "\n📦 bubblewrap build exit code: $exit_code"
          exit $exit_code
          EXPECT_SCRIPT

          expect /tmp/build_twa.exp

          echo ""
          echo "📁 Build output:"
          find . -name "*.apk" -o -name "*.aab" | head -10
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          BUBBLEWRAP_KEYPASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUBBLEWRAP_STOREPASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      # ── Re-sign APK with our keystore ────────────────────────────
      - name: Sign APK
        run: |
          APK_FILE=$(find twa -name "*-signed.apk" -o -name "*-release.apk" -o -name "*.apk" 2>/dev/null | head -1)

          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK found! Listing all files:"
            find twa -type f \( -name "*.apk" -o -name "*.aab" \)
            ls -laR twa/app/build/outputs/ 2>/dev/null || true
            exit 1
          fi

          echo "📦 Found: $APK_FILE"

          APKSIGNER=$(find "$ANDROID_HOME" -name "apksigner" -type f 2>/dev/null | sort -r | head -1)

          if [ -n "$APKSIGNER" ]; then
            echo "🔏 Signing with apksigner..."
            "$APKSIGNER" sign \
              --ks "${{ github.workspace }}/release-keystore.jks" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out "${{ github.workspace }}/chore-quest-signed.apk" \
              "$APK_FILE"
          else
            echo "⚠️ apksigner not found – using jarsigner"
            cp "$APK_FILE" "${{ github.workspace }}/chore-quest-signed.apk"
            jarsigner -verbose \
              -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore "${{ github.workspace }}/release-keystore.jks" \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "${{ github.workspace }}/chore-quest-signed.apk" \
              "${{ secrets.KEY_ALIAS }}"
          fi

      - name: Verify APK signature
        run: |
          APKSIGNER=$(find "$ANDROID_HOME" -name "apksigner" -type f 2>/dev/null | sort -r | head -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose "${{ github.workspace }}/chore-quest-signed.apk"
          else
            jarsigner -verify "${{ github.workspace }}/chore-quest-signed.apk"
          fi

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: chore-quest-v${{ github.event.inputs.version_name || '1.0.0' }}
          path: ${{ github.workspace }}/chore-quest-signed.apk
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: rm -f "${{ github.workspace }}/release-keystore.jks"
